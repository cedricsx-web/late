<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TC Tracker">
<link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f4cb.png">
<title>TC Lateness Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    padding: 16px;
    max-width: 1100px;
    margin: 0 auto;
    color: #333;
    min-height: 100vh;
  }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 0;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 36px 32px 28px 32px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .login-card h2 { font-size: 20px; color: #222; }
  .login-card p { font-size: 13px; color: #888; text-align: center; }
  .login-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    color: #333;
    background: #fafafa;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { outline: none; border-color: #4A90D9; background: white; }
  .login-btn {
    width: 100%;
    background: #4A90D9;
    color: white;
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    min-height: 48px;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #357ABD; }
  .login-error {
    color: #e74c3c;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .admin-toggle {
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    text-decoration: underline;
    margin-top: -8px;
  }
  .admin-section {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .admin-section.visible { display: flex; }
  .admin-label {
    font-size: 12px;
    color: #888;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .role-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-admin { background: #fff3cd; color: #856404; }
  .badge-user  { background: #e8f4fd; color: #1a6fa3; }

  /* ── TOP BAR ── */
  #appScreen { display: none; }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar h1 { font-size: 20px; }
  .top-bar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .user-pill {
    background: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-status {
    font-size: 11px;
    color: #aaa;
    white-space: nowrap;
  }
  .sync-status.syncing { color: #f39c12; }
  .sync-status.ok { color: #27ae60; }
  .sync-status.error { color: #e74c3c; }
  .logout-btn {
    background: none;
    border: 1px solid #ddd;
    color: #888;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    min-height: 30px;
  }
  .logout-btn:hover { background: #f5f5f5; color: #333; }

  /* ── CARDS ── */
  h1 { text-align: center; margin-bottom: 5px; font-size: 22px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
  .person-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .person-card.locked { opacity: 0.55; pointer-events: none; }
  .person-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    border-radius: 10px;
  }
  .person-header .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: white;
    flex-shrink: 0;
  }
  .person-header .name-label {
    font-size: 16px; font-weight: 600;
    flex: 1; min-width: 0;
    padding: 4px 6px;
  }
  .person-header .summary {
    font-size: 12px; color: #666;
    text-align: right; flex-shrink: 0; white-space: nowrap;
  }
  .person-header .summary strong { font-size: 15px; }
  .collapse-icon {
    margin-left: 4px; transition: transform 0.3s;
    font-size: 14px; color: #999; flex-shrink: 0;
  }
  .person-card.collapsed .collapse-icon { transform: rotate(-90deg); }
  .person-card.collapsed .person-body { display: none; }
  .person-body {
    padding: 0 14px 18px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .person-body { grid-template-columns: 1fr; } }
  .mini-section { border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
  .mini-section h4 {
    background: #fafafa; padding: 8px 12px;
    font-size: 13px; color: #555; border-bottom: 1px solid #eee;
  }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .mini-section table {
    width: 100%; border-collapse: collapse;
    table-layout: fixed; min-width: 260px;
  }
  .mini-section th {
    background: #f5f5f5; padding: 5px 6px;
    text-align: left; font-size: 11px;
    border-bottom: 1px solid #ddd; color: #666;
  }
  .mini-section td {
    padding: 3px 6px; border-bottom: 1px solid #f5f5f5;
    font-size: 13px; vertical-align: middle;
  }
  .mini-section input[type="date"],
  .mini-section input[type="text"],
  .mini-section select {
    width: 100%; padding: 4px 4px;
    border: 1px solid #ddd; border-radius: 3px;
    font-size: 16px; -webkit-appearance: none;
    background: white; color: #333;
  }
  .mini-section input:focus, .mini-section select:focus {
    outline: none; border-color: #4A90D9;
  }
  .stat-label { font-weight: 600; color: #555; font-size: 12px; }
  .stat-value {
    background: #f9f9f9; padding: 3px 8px;
    border-radius: 3px; font-weight: bold;
    font-size: 12px; color: #2a2a2a;
  }
  .note { color: #999; font-size: 11px; font-style: italic; }
  button {
    background: #4A90D9; color: white; border: none;
    padding: 6px 12px; border-radius: 4px;
    cursor: pointer; font-size: 13px; min-height: 36px;
  }
  button:hover { background: #357ABD; }
  .delete-btn {
    background: none; color: #e74c3c;
    padding: 4px 8px; font-size: 13px;
    min-height: 36px; min-width: 36px;
  }
  .add-btn { margin-top: 8px; font-size: 13px; }
  .color-hint {
    background: #fffde7; border-left: 3px solid #ffc107;
    padding: 4px 8px; font-size: 11px; color: #888; margin-top: 6px;
  }
  .stats-table { margin-top: 8px; width: 100%; }
  .stats-table td { padding: 3px 6px; font-size: 12px; }
  .avatar-0 { background: #E74C3C; }
  .avatar-1 { background: #3498DB; }
  .avatar-2 { background: #2ECC71; }
  .header-0 { border-left: 4px solid #E74C3C; border-radius: 10px; }
  .header-1 { border-left: 4px solid #3498DB; border-radius: 10px; }
  .header-2 { border-left: 4px solid #2ECC71; border-radius: 10px; }
  #errorBanner {
    background: #fde8e8; border: 1px solid #e74c3c;
    color: #c0392b; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 16px; font-size: 13px; display: none;
  }
  .lock-icon { font-size: 13px; margin-left: 4px; color: #bbb; }
  .loading-overlay {
    text-align: center; padding: 40px;
    color: #aaa; font-size: 14px;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div style="font-size:40px;">📋</div>
    <h2>TC Lateness Tracker</h2>
    <p>Enter your name to access your data</p>

    <input class="login-input" id="nameInput" type="text" placeholder="Your name (e.g. Marie)" autocomplete="off" autocorrect="off" spellcheck="false">

    <span class="admin-toggle" id="adminToggle">Admin? Enter code →</span>

    <div class="admin-section" id="adminSection">
      <span class="admin-label">🔐 Admin code</span>
      <input class="login-input" id="adminCodeInput" type="password" placeholder="Enter admin code">
    </div>

    <div class="login-error" id="loginError">Please enter your name.</div>
    <button class="login-btn" id="loginBtn">Continue →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP SCREEN
══════════════════════════════════════ -->
<div id="appScreen">
  <div class="top-bar">
    <h1>📋 TC Lateness Tracker</h1>
    <div class="top-bar-right">
      <div class="user-pill">
        <span id="userPillName">—</span>
        <span id="userPillBadge" class="role-badge badge-user">user</span>
      </div>
      <span class="sync-status" id="syncStatus">⏳ loading…</span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div id="errorBanner"></div>
  <div id="peopleContainer"></div>
</div>

<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
var SUPABASE_URL  = 'https://sciovxpbhjrkfztjjuhw.supabase.co';
var SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjaW92eHBiaGpya2Z6dGpqdWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODg3ODMsImV4cCI6MjA5NjE2NDc4M30.sHd-b9uCk5yNVcRg95-7BAFK0JUQbsiiM2w__Wv6lIc';
var ADMIN_CODE    = 'TC-7841';   // ← admin password
var NUM_PERSONS   = 3;

// Colours / icons for slots 0,1,2
var AVATAR_COLORS  = ['#E74C3C','#3498DB','#2ECC71'];
var HEADER_COLORS  = ['#E74C3C','#3498DB','#2ECC71'];
var WORKDAYS_PER_MONTH = 22;

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
var currentUser  = null;   // { name, slot, isAdmin }
var allData      = [];     // array of 3 objects { id, person_name, method2, method1 }
var saveTimers   = {};

// ════════════════════════════════════════
// SUPABASE HELPERS
// ════════════════════════════════════════
function sbHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

async function sbFetchAll() {
  var res = await fetch(SUPABASE_URL + '/rest/v1/lateness_data?order=id', { headers: sbHeaders() });
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  return await res.json();
}

async function sbUpsert(row) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/lateness_data', {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    var txt = await res.text();
    throw new Error('Save failed: ' + res.status + ' ' + txt);
  }
  return await res.json();
}

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
document.getElementById('adminToggle').addEventListener('click', function() {
  var sec = document.getElementById('adminSection');
  sec.classList.toggle('visible');
});

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  var name = document.getElementById('nameInput').value.trim();
  var code = document.getElementById('adminCodeInput').value.trim();
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!name) {
    errEl.textContent = 'Please enter your name.';
    errEl.style.display = 'block';
    return;
  }

  var isAdmin = (code === ADMIN_CODE);

  // Load all rows from Supabase
  setSyncStatus('syncing', '⏳ connecting…');
  var rows;
  try {
    rows = await sbFetchAll();
  } catch(e) {
    errEl.textContent = 'Cannot connect to database: ' + e.message;
    errEl.style.display = 'block';
    setSyncStatus('error', '❌ offline');
    return;
  }

  // Find existing slot for this name (case-insensitive)
  var slot = -1;
  for (var i = 0; i < rows.length; i++) {
    if (rows[i].person_name.toLowerCase() === name.toLowerCase()) {
      slot = i; break;
    }
  }

  if (slot === -1) {
    // New person — assign next free slot (max 3)
    if (rows.length >= NUM_PERSONS && !isAdmin) {
      errEl.textContent = 'All ' + NUM_PERSONS + ' slots are taken. Check your spelling or ask admin.';
      errEl.style.display = 'block';
      return;
    }
    slot = rows.length; // next index
    // Create the row
    try {
      await sbUpsert({ id: 'person_' + slot, person_name: name, method2: [], method1: [] });
      rows = await sbFetchAll();
    } catch(e) {
      errEl.textContent = 'Could not create your profile: ' + e.message;
      errEl.style.display = 'block';
      return;
    }
  }

  // Normalise allData to always 3 slots
  allData = [];
  for (var s = 0; s < NUM_PERSONS; s++) {
    var found = null;
    for (var r = 0; r < rows.length; r++) {
      if (rows[r].id === 'person_' + s) { found = rows[r]; break; }
    }
    allData.push(found || { id: 'person_' + s, person_name: '—', method2: [], method1: [] });
  }

  currentUser = { name: name, slot: slot, isAdmin: isAdmin };

  // Switch screens
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userPillName').textContent = name;
  document.getElementById('userPillBadge').textContent = isAdmin ? 'admin' : 'user';
  document.getElementById('userPillBadge').className = 'role-badge ' + (isAdmin ? 'badge-admin' : 'badge-user');
  setSyncStatus('ok', '✓ synced');

  buildAll();
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  currentUser = null;
  allData = [];
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('nameInput').value = '';
  document.getElementById('adminCodeInput').value = '';
  document.getElementById('adminSection').classList.remove('visible');
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('peopleContainer').innerHTML = '';
});

// ════════════════════════════════════════
// SYNC STATUS
// ════════════════════════════════════════
function setSyncStatus(state, text) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = text;
  el.className = 'sync-status ' + state;
}

// ════════════════════════════════════════
// SAVE TO SUPABASE (debounced per slot)
// ════════════════════════════════════════
function scheduleSave(slot) {
  clearTimeout(saveTimers[slot]);
  setSyncStatus('syncing', '⏳ saving…');
  saveTimers[slot] = setTimeout(async function() {
    var row = allData[slot];
    try {
      await sbUpsert({ id: row.id, person_name: row.person_name, method2: row.method2, method1: row.method1, updated_at: new Date().toISOString() });
      setSyncStatus('ok', '✓ synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
    } catch(e) {
      setSyncStatus('error', '❌ save failed');
      showError('Auto-save failed: ' + e.message);
    }
  }, 1200);
}

function showError(msg) {
  var el = document.getElementById('errorBanner');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 6000);
}

// ════════════════════════════════════════
// BUILD UI
// ════════════════════════════════════════
function buildAll() {
  var container = document.getElementById('peopleContainer');
  container.innerHTML = '';
  for (var p = 0; p < NUM_PERSONS; p++) {
    var card = document.createElement('div');
    card.className = 'person-card';
    card.setAttribute('data-p', p);

    // Lock if not admin and not own slot
    var isLocked = !currentUser.isAdmin && p !== currentUser.slot;
    if (isLocked) card.classList.add('locked');

    card.innerHTML = buildPersonHTML(p);
    container.appendChild(card);
  }
  updateAllStats();
}

function escapeHTML(str) {
  var d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function buildPersonHTML(p) {
  var row    = allData[p] || {};
  var name   = row.person_name || '—';
  var m2     = row.method2 || [];
  var m1     = row.method1 || [];

  var isOwn    = currentUser && p === currentUser.slot;
  var isAdmin  = currentUser && currentUser.isAdmin;
  var editable = isOwn || isAdmin;

  // M2 rows
  var m2Rows = '';
  var maxM2 = Math.max(6, m2.length + 1);
  for (var i = 0; i < maxM2; i++) {
    var val = m2[i] || '';
    var interval = (i > 0 && m2[i] && m2[i-1]) ? getWorkdaysBetween(m2[i-1], m2[i]) : null;
    var iText = (i === 0) ? '—' : (interval !== null ? interval + 'd' : '—');
    m2Rows += '<tr data-p="' + p + '" data-type="m2" data-idx="' + i + '">'
      + '<td style="width:24px;text-align:center;color:#999;font-size:11px;">' + (i+1) + '</td>'
      + '<td><input type="date" class="m2-date" data-p="' + p + '" data-idx="' + i + '" value="' + val + '"' + (editable?'':' disabled') + '></td>'
      + '<td style="width:44px;font-size:11px;color:#666;" class="m2-interval">' + iText + '</td>'
      + '<td style="width:36px;">' + (editable ? '<button class="delete-btn m2-delete" data-p="' + p + '" data-idx="' + i + '">✕</button>' : '') + '</td>'
      + '</tr>';
  }

  // M1 rows
  var m1Rows = '';
  var maxM1 = Math.max(6, m1.length + 1);
  for (var j = 0; j < maxM1; j++) {
    var entry = m1[j] || { date: '', check: 'Yes', late: '' };
    m1Rows += '<tr data-p="' + p + '" data-type="m1" data-idx="' + j + '">'
      + '<td><input type="date" class="m1-date" data-p="' + p + '" data-idx="' + j + '" value="' + entry.date + '"' + (editable?'':' disabled') + '></td>'
      + '<td style="width:60px;"><select class="m1-check" data-p="' + p + '" data-idx="' + j + '"' + (editable?'':' disabled') + '>'
      + '<option value="Yes"' + (entry.check==='Yes'?' selected':'') + '>Yes</option>'
      + '<option value="No"'  + (entry.check==='No' ?' selected':'') + '>No</option>'
      + '</select></td>'
      + '<td style="width:60px;"><input type="text" class="m1-late" data-p="' + p + '" data-idx="' + j + '" value="' + escapeHTML(entry.late) + '" placeholder="Yes/No"' + (editable?'':' disabled') + '></td>'
      + '<td style="width:36px;">' + (editable ? '<button class="delete-btn m1-delete" data-p="' + p + '" data-idx="' + j + '">✕</button>' : '') + '</td>'
      + '</tr>';
  }

  var lockIcon = (!editable) ? '<span class="lock-icon">🔒</span>' : '';

  return ''
    + '<div class="person-header header-p" style="border-left:4px solid ' + HEADER_COLORS[p] + ';border-radius:10px;" data-toggle="' + p + '">'
    + '<div class="avatar" style="background:' + AVATAR_COLORS[p] + ';width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;">' + escapeHTML(name).charAt(0).toUpperCase() + '</div>'
    + '<span class="name-label">' + escapeHTML(name) + lockIcon + '</span>'
    + '<div class="summary">'
    + '<span class="m2-summary-' + p + '" style="margin-right:8px;">M2: <strong>—</strong></span>'
    + '<span class="m1-summary-' + p + '">M1: <strong>—</strong></span>'
    + '</div>'
    + '<span class="collapse-icon">▼</span>'
    + '</div>'
    + '<div class="person-body">'

    // Method 2
    + '<div class="mini-section">'
    + '<h4>🔴 Method 2: Lateness Log</h4>'
    + '<div class="table-scroll"><table>'
    + '<thead><tr><th style="width:24px;">#</th><th>Date</th><th style="width:44px;">Δd</th><th style="width:36px;"></th></tr></thead>'
    + '<tbody>' + m2Rows + '</tbody>'
    + '</table></div>'
    + (editable ? '<button class="add-btn m2-add" data-p="' + p + '">+ Add Row</button>' : '')
    + '<div class="color-hint">💡 Only fill in dates when late.</div>'
    + '<table class="stats-table">'
    + '<tr><td class="stat-label">Total Late:</td><td><span class="stat-value m2-count-' + p + '">—</span></td></tr>'
    + '<tr><td class="stat-label">Avg Interval:</td><td><span class="stat-value m2-interval-' + p + '">—</span></td></tr>'
    + '<tr><td class="stat-label">Est. Monthly:</td><td><span class="stat-value m2-est-' + p + '">—</span> <span class="note">days</span></td></tr>'
    + '</table>'
    + '</div>'

    // Method 1
    + '<div class="mini-section">'
    + '<h4>🔵 Method 1: Spot Check</h4>'
    + '<div class="table-scroll"><table>'
    + '<thead><tr><th>Date</th><th style="width:60px;">Check?</th><th style="width:60px;">Late?</th><th style="width:36px;"></th></tr></thead>'
    + '<tbody>' + m1Rows + '</tbody>'
    + '</table></div>'
    + (editable ? '<button class="add-btn m1-add" data-p="' + p + '">+ Add Row</button>' : '')
    + '<div class="color-hint">💡 Set Check?=Yes on random days. Fill Late? at day end.</div>'
    + '<table class="stats-table">'
    + '<tr><td class="stat-label">Checked:</td><td><span class="stat-value m1-checked-' + p + '">—</span> days</td></tr>'
    + '<tr><td class="stat-label">Late:</td><td><span class="stat-value m1-latecount-' + p + '">—</span> days</td></tr>'
    + '<tr><td class="stat-label">Ratio:</td><td><span class="stat-value m1-ratio-' + p + '">—</span></td></tr>'
    + '<tr><td class="stat-label">Est. Monthly:</td><td><span class="stat-value m1-est-' + p + '">—</span> days</td></tr>'
    + '<tr><td class="stat-label">95% CI:</td><td><span class="stat-value m1-ci-' + p + '">—</span></td></tr>'
    + '</table>'
    + '</div>'
    + '</div>';
}

// ════════════════════════════════════════
// EVENTS (delegated)
// ════════════════════════════════════════
document.getElementById('peopleContainer').addEventListener('click', function(e) {
  var target = e.target;

  // Collapse toggle
  var header = target.closest('[data-toggle]');
  if (header && target.tagName !== 'INPUT' && target.tagName !== 'BUTTON' && target.tagName !== 'SELECT') {
    var card = header.closest('.person-card');
    if (card) card.classList.toggle('collapsed');
    return;
  }

  // Delete M2
  if (target.classList.contains('m2-delete')) {
    e.stopPropagation();
    var p = parseInt(target.dataset.p), idx = parseInt(target.dataset.idx);
    allData[p].method2.splice(idx, 1);
    scheduleSave(p);
    buildAll();
    return;
  }

  // Delete M1
  if (target.classList.contains('m1-delete')) {
    e.stopPropagation();
    var p = parseInt(target.dataset.p), idx = parseInt(target.dataset.idx);
    allData[p].method1.splice(idx, 1);
    scheduleSave(p);
    buildAll();
    return;
  }

  // Add M2 row
  if (target.classList.contains('m2-add')) {
    e.stopPropagation();
    var p = parseInt(target.dataset.p);
    allData[p].method2.push('');
    scheduleSave(p);
    buildAll();
    return;
  }

  // Add M1 row
  if (target.classList.contains('m1-add')) {
    e.stopPropagation();
    var p = parseInt(target.dataset.p);
    allData[p].method1.push({ date: '', check: 'Yes', late: '' });
    scheduleSave(p);
    buildAll();
    return;
  }
});

document.getElementById('peopleContainer').addEventListener('change', function(e) {
  var target = e.target;
  var p = parseInt(target.dataset.p);
  if (isNaN(p)) return;

  if (target.classList.contains('m2-date')) {
    collectM2Dates(p);
    scheduleSave(p);
    updateAllStats();
  } else if (target.classList.contains('m1-date') || target.classList.contains('m1-check') || target.classList.contains('m1-late')) {
    collectM1Entries(p);
    scheduleSave(p);
    updateAllStats();
  }
});

// ════════════════════════════════════════
// DATA COLLECTION FROM DOM
// ════════════════════════════════════════
function collectM2Dates(p) {
  var inputs = document.querySelectorAll('.m2-date[data-p="' + p + '"]');
  allData[p].method2 = [];
  inputs.forEach(function(inp) { if (inp.value) allData[p].method2.push(inp.value); });
}

function collectM1Entries(p) {
  var rows = document.querySelectorAll('tr[data-p="' + p + '"][data-type="m1"]');
  allData[p].method1 = [];
  rows.forEach(function(row) {
    var d = row.querySelector('.m1-date');
    var c = row.querySelector('.m1-check');
    var l = row.querySelector('.m1-late');
    if (d && d.value) {
      allData[p].method1.push({ date: d.value, check: c ? c.value : 'Yes', late: l ? l.value : '' });
    }
  });
}

// ════════════════════════════════════════
// STATS
// ════════════════════════════════════════
function getWorkdaysBetween(startStr, endStr) {
  if (!startStr || !endStr) return null;
  var start = new Date(startStr + 'T00:00:00');
  var end   = new Date(endStr   + 'T00:00:00');
  if (start >= end) return 0;
  start.setDate(start.getDate() + 1);
  var count = 0;
  while (start <= end) {
    var day = start.getDay();
    if (day !== 0 && day !== 6) count++;
    start.setDate(start.getDate() + 1);
  }
  return count;
}

function updateAllStats() {
  for (var p = 0; p < NUM_PERSONS; p++) {
    updateM2Stats(p);
    updateM1Stats(p);
  }
}

function updateM2Stats(p) {
  var dates = (allData[p].method2 || []).filter(function(d){ return d; });
  var count = dates.length;
  var countEl    = document.querySelector('.m2-count-'    + p);
  var intervalEl = document.querySelector('.m2-interval-' + p);
  var estEl      = document.querySelector('.m2-est-'      + p);
  var summaryEl  = document.querySelector('.m2-summary-'  + p + ' strong');
  if (countEl)   countEl.textContent   = count + ' times';
  if (summaryEl) summaryEl.textContent = count + 'x';
  if (count < 2) {
    if (intervalEl) intervalEl.textContent = 'Need ≥2';
    if (estEl)      estEl.textContent      = '—';
    return;
  }
  var intervals = [];
  for (var i = 1; i < dates.length; i++) {
    var wd = getWorkdaysBetween(dates[i-1], dates[i]);
    if (wd !== null && wd >= 0) intervals.push(wd);
  }
  if (!intervals.length) { if (intervalEl) intervalEl.textContent = '—'; if (estEl) estEl.textContent = '—'; return; }
  var avg = intervals.reduce(function(a,b){return a+b;},0) / intervals.length;
  if (intervalEl) intervalEl.textContent = avg.toFixed(1) + ' days';
  if (estEl)      estEl.textContent      = (WORKDAYS_PER_MONTH / avg).toFixed(1);
}

function updateM1Stats(p) {
  var entries = (allData[p].method1 || []).filter(function(e){ return e.date; });
  var checked = 0, late = 0;
  entries.forEach(function(e) {
    if (e.check === 'Yes') {
      checked++;
      var lv = (e.late || '').trim().toLowerCase();
      if (lv === 'yes' || lv === 'y') late++;
    }
  });
  var checkedEl = document.querySelector('.m1-checked-'  + p);
  var lateEl    = document.querySelector('.m1-latecount-' + p);
  var ratioEl   = document.querySelector('.m1-ratio-'    + p);
  var estEl     = document.querySelector('.m1-est-'      + p);
  var ciEl      = document.querySelector('.m1-ci-'       + p);
  var summaryEl = document.querySelector('.m1-summary-'  + p + ' strong');
  if (checkedEl) checkedEl.textContent = checked;
  if (lateEl)    lateEl.textContent    = late;
  if (checked === 0) {
    if (ratioEl)   ratioEl.textContent   = '—';
    if (estEl)     estEl.textContent     = '—';
    if (ciEl)      ciEl.textContent      = '—';
    if (summaryEl) summaryEl.textContent = '—';
    return;
  }
  var ratio = late / checked;
  if (ratioEl)   ratioEl.textContent   = (ratio * 100).toFixed(1) + '%';
  var est = ratio * WORKDAYS_PER_MONTH;
  if (estEl)     estEl.textContent     = est.toFixed(1) + ' days';
  if (summaryEl) summaryEl.textContent = est.toFixed(1) + 'd';
  var se    = Math.sqrt(ratio * (1 - ratio) / checked);
  var lower = Math.max(0, ratio - 1.96 * se);
  var upper = Math.min(1, ratio + 1.96 * se);
  if (ciEl) ciEl.textContent = (lower * WORKDAYS_PER_MONTH).toFixed(1) + ' – ' + (upper * WORKDAYS_PER_MONTH).toFixed(1) + ' days';
}
</script>
